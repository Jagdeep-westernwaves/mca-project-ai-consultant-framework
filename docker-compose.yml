version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: aimcf_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: ai_consulting_db
      MYSQL_USER: consulting_user
      MYSQL_PASSWORD: consulting_pass
      MYSQL_ROOT_PASSWORD: root_consulting_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aimcf_django_backend
    restart: always
    command: >
      bash -c "python manage.py migrate &&
               python manage.py seed_db &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: aimcf_react_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_media:
